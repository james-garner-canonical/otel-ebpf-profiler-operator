[tox]
skipsdist=True
skip_missing_interpreters = True
envlist = lint, static, unit, terraform-deploy

[vars]
lib_path = {toxinidir}/lib
src_path = {toxinidir}/src
tst_path = {toxinidir}/tests
all_path = {[vars]src_path} {[vars]tst_path}
uv_flags = --frozen --isolated --extra=dev

[testenv]
allowlist_externals = uv
basepython = python3
setenv =
  PYTHONPATH = {toxinidir}/lib:{[vars]src_path}
  PYTHONBREAKPOINT=ipdb.set_trace
  PY_COLORS=1
passenv =
  PYTHONPATH
  CHARM_PATH
  CHARM_CHANNEL
  KEEP_MODELS

[testenv:lock]
description = Update uv.lock with the latest deps
commands = 
  uv lock --upgrade --no-cache

[testenv:lint]
description = Lint the code
commands =
  uv run {[vars]uv_flags} ruff check {[vars]all_path}

[testenv:static]
description = Run static checks
allowlist_externals =
  {[testenv]allowlist_externals}
  /usr/bin/env
commands =
  uv run {[vars]uv_flags} pyright {[vars]all_path}
  ; TODO: uncomment if this charm gets a library
  ; /usr/bin/env sh -c 'for m in $(git diff main --name-only {[vars]lib_path}); do if ! git diff main $m | grep -q "+LIBPATCH\|+LIBAPI"; then echo "You forgot to bump the version on $m!"; exit 1; fi; done'

[testenv:fmt]
description = "Format the code"
allowlist_externals =
  {[testenv]allowlist_externals}
  tofu
commands =
  uv run {[vars]uv_flags} ruff check --fix-only {[vars]all_path}
  uv run {[vars]uv_flags} ruff format {[vars]all_path}
  # terraform files formatting; requires opentofu snap (classic)
  tofu fmt -recursive


[testenv:unit]
description = Run unit tests
allowlist_externals =
  {[testenv]allowlist_externals}
  /usr/bin/env
commands =
  uv run {[vars]uv_flags} coverage run --source={[vars]src_path},{[vars]lib_path} -m pytest \
      {[vars]tst_path}/unit {posargs}
  uv run {[vars]uv_flags} coverage report

[testenv:integration]
description = Run integration tests
commands =
  uv run {[vars]uv_flags} pytest --exitfirst {[vars]tst_path}/integration {posargs}

[testenv:terraform-deploy]
description = Run terraform deployment tests
commands =
  uv run {[vars]uv_flags} pytest --exitfirst {[vars]tst_path}/terraform {posargs}
